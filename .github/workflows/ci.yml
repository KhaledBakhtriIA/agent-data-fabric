name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-types:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Pyright (strict type check)
        run: pyright

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the minimum supported version and a recent one.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
